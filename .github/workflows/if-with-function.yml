name: if-function-example
on:
    push:
        branches:
            - main
            - develop
            - feature/**
jobs:
    quality-check:
        if: startsWith(github.ref_name,'feature') && github.event_name == 'push'
        runs-on: ubuntu-latest
        steps:
            - name: perform the quality
              run: echo "Performing the quality check on the code"

    dev_deploy:
        if: github.ref_name == 'develop' && github.event_name == 'push'
        runs-on: ubuntu-latest
        steps:
            - name: Dev Deploy
              run: echo "Performing the quality check on the code"

    
    prod_deploy:
        if: github.ref_name == 'main' && github.event_name == 'push'
        runs-on: ubuntu-latest
        steps:
            - name: Prod Deploy
              run: echo "Deploying code to production" 

    success_notify:
        needs: ['quality-check','dev_deploy','prod_deploy']          
        if: always() && !failure()
        runs-on: ubuntu-latest
        steps:
            - name: Notify Success
              run: echo "Success email sent to the team"

    failure_notify:
        needs: ['quality-check','dev_deploy','prod_deploy']          
        if: failure()
        runs-on: ubuntu-latest
        steps:
            - name: Notify failure
              run: echo "Failure email sent to the team"          