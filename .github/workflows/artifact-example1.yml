name: artifact example
on:
 push:
    branches:
     - main
jobs:
   create-file:
     runs-on: ubuntu-latest

     steps:
       - name: creating a file
         run: | 
           touch sample.txt
           echo "This is the text file" > sample.txt
           echo "File created by Prashant Mhamunkar" >> sample.txt
           ls -la
           cat sample.txt

       - name: uploading artifact
         uses: actions/upload-artifact@v4
         with:
           name: artifact-example
           path: sample.txt


   download-artifact:
     runs-on:  ubuntu-latest
     needs: create-file
     steps: 
       - name: download artifact
         uses: actions/download-artifact@v4
         with: 
           name: artifact-example

       - name: viewing the file
         run: |
           ls -R
           cat sample.txt
